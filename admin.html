<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - Gunel's story</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --primary-blue: #03138d;
            --accent-orange: #ff9f1c;
            --text-dark: #2b2b2b;
            --white: #ffffff;
            --border-color: #e2e8f0;
            --whatsapp-color: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); padding: 30px 20px; }

        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #03138d; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }

        .login-box {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center;
        }

        .login-box h2 { color: #03138d; margin-bottom: 25px; font-weight: 800; }
        .login-input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 1rem; }
        .login-input:focus { border-color: #ff9f1c; }
        .login-btn { width: 100%; padding: 14px; background: #ff9f1c; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        .admin-container { max-width: 1200px; margin: 0 auto; background-color: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); display: none; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 20px; margin-bottom: 30px; }
        .admin-header h1 { color: var(--primary-blue); font-size: 2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .back-btn { text-decoration: none; background-color: #1a1a1a; color: var(--white); padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; }
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 700; padding: 16px; border-bottom: 2px solid var(--border-color); }
        td { padding: 16px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        tr:hover { background-color: #f8fafc; }
        .phone-container { display: flex; align-items: center; gap: 10px; }
        .phone-link { color: var(--primary-blue); text-decoration: none; font-weight: 600; }
        .whatsapp-btn { display: inline-flex; align-items: center; justify-content: center; background-color: var(--whatsapp-color); color: white; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; }
        .interests-cell { max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .interests-cell:hover { white-space: normal; background: #fffdf5; }
    </style>
</head>
<body>

    <!-- Firestore Bağlantılı Login Ekranı -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>Giriş Paneli ⚙️</h2>
            <input type="text" id="username" class="login-input" placeholder="İstifadəçi adı">
            <input type="password" id="password" class="login-input" placeholder="Şifrə">
            <button onclick="checkFirestoreLogin()" id="loginBtn" class="login-btn">Daxil Ol</button>
            <p id="loginError" style="color: red; margin-top: 10px; display: none;">Məlumatlar yanlışdır və ya baza bağlantısı qurulmadı!</p>
        </div>
    </div>

    <!-- Sifariş Paneli -->
    <div class="admin-container" id="adminContainer">
        <div class="admin-header">
            <h1>⚙️ Sifarişlərin İdarə Edilməsi</h1>
            <a href="index.html" class="back-btn">← Sayta Qayıt</a>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Valideynin Adı</th>
                        <th>Telefon / WhatsApp</th>
                        <th>Uşağın Adı</th>
                        <th>Yaşı</th>
                        <th>Maraqları / İstəkləri</th>
                        <th>Sifariş Tarixi</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #888;">Məlumatlar yüklənir...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Real Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyDWqLPM2X89vyqOYocw4KEBh65WKMutZOI", 
            authDomain: "gunelsstory-6d3a9.firebaseapp.com", 
            projectId: "gunelsstory-6d3a9", 
            storageBucket: "gunelsstory-6d3a9.firebasestorage.app", 
            messagingSenderId: "903174908342", 
            appId: "1:903174908342:web:f73871214550442e553917", 
            measurementId: "G-5Q48RSFFH9" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Firestore-dan Giriş Məlumatlarını Yoxlayan Funksiya
        function checkFirestoreLogin() {
            const userInput = document.getElementById('username').value;
            const passInput = document.getElementById('password').value;
            const errorText = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');

            errorText.style.display = 'none';
            loginBtn.innerText = "Yoxlanılır...";
            loginBtn.disabled = true;

            // Firestore-dan 'adminConfig' kolleksiyasındakı 'credentials' sənədini çəkirik
            db.collection("adminConfig").doc("credentials").get().then(function(doc) {
                if (doc.exists) {
                    const dbData = doc.data();
                    
                    // Bazadakı məlumatlarla formadakı məlumatları qarşılaşdırırıq
                    if (userInput === dbData.username && passInput === dbData.password) {
                        document.getElementById('loginOverlay').style.display = 'none';
                        document.getElementById('adminContainer').style.display = 'block';
                        startListeningOrders(); // Giriş uğurludursa sifarişləri göstər
                    } else {
                        errorText.innerText = "İstifadəçi adı və ya şifrə yanlışdır!";
                        errorText.style.display = 'block';
                    }
                } else {
                    errorText.innerText = "Firestore-da adminConfig kolleksiyası tapılmadı!";
                    errorText.style.display = 'block';
                }
            }).catch(function(error) {
                console.error("Giriş xətası:", error);
                errorText.innerText = "Bağlantı xətası: " + error.message;
                errorText.style.display = 'block';
            }).finally(function() {
                loginBtn.innerText = "Daxil Ol";
                loginBtn.disabled = false;
            });
        }

        // Sifarişləri Canlı Dinləyən Funksiya
        function startListeningOrders() {
            const ordersTableBody = document.getElementById('ordersTableBody');

            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(function(snapshot) {
                ordersTableBody.innerHTML = ''; 

                if (snapshot.empty) {
                    ordersTableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 30px; color: #888;">Hələ heç bir sifariş yoxdur.</td></tr>';
                    return;
                }

                snapshot.forEach(function(doc) {
                    const data = doc.data();
                    let orderDate = "Gözlənilir...";
                    if (data.createdAt) {
                        orderDate = data.createdAt.toDate().toLocaleString('az-AZ');
                    }

                    const cleanPhone = (data.parentPhone || '').replace(/\D/g, '');
                    let waLink = `https://wa.me/${cleanPhone}`;
                    if (cleanPhone.startsWith('0')) {
                        waLink = `https://wa.me/994${cleanPhone.substring(1)}`;
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: 600;">${data.parentName || ''}</td>
                        <td>
                            <div class="phone-container">
                                <a href="tel:${data.parentPhone || ''}" class="phone-link">${data.parentPhone || ''}</a>
                                <a href="${waLink}" target="_blank" class="whatsapp-btn">💬 WhatsApp</a>
                            </div>
                        </td>
                        <td>${data.childName || ''}</td>
                        <td><span style="background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 6px; font-weight: bold;">${data.childAge || '-'}</span></td>
                        <td class="interests-cell" title="Tam görmək üçün üzərinə gəlin">${data.childInterests || '-'}</td>
                        <td style="color: #64748b; font-size: 0.9rem;">${orderDate}</td>
                    `;
                    ordersTableBody.appendChild(tr);
                });
            });
        }
    </script>
</body>
</html>
