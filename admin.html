<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - Gunel's story</title>
    <link rel="icon" type="image/png" href="image/favicon.png">
    <style>
        :root {
            --bg-color: #FAF6EE; /* Premium yumşaq krem tonu */
            --primary-blue: #1E2A78; /* Lüks göy rəng */
            --accent-gold: #E67E22; /* Premium qızılı-narıncı ton */
            --text-dark: #2D2D2D;
            --text-muted: #666666;
            --white: #ffffff;
            --border-color: rgba(30, 42, 120, 0.08);
            --whatsapp-color: #25D366;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --border-radius-lg: 30px;
            --border-radius-sm: 16px;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-dark); 
            padding: 40px 15px; 
            background-image: radial-gradient(#F5EFE4 1.5px, transparent 1.5px);
            background-size: 24px 24px; /* Zərif nöqtəli premium arxa fon */
        }

        /* Müasir Giriş Ekranı (Login Screen) */
        .login-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: linear-gradient(135deg, #1E2A78 0%, #10184D 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999;
            padding: 20px;
        }

        .login-box {
            background: var(--white); 
            padding: 50px 40px; 
            border-radius: var(--border-radius-lg);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); 
            width: 100%; 
            max-width: 440px; 
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-box h2 { 
            color: var(--primary-blue); 
            margin-bottom: 30px; 
            font-weight: 900; 
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .login-input { 
            width: 100%; 
            padding: 16px 18px; 
            margin-bottom: 18px; 
            border: 2px solid #EAEAEA; 
            border-radius: var(--border-radius-sm); 
            outline: none; 
            font-size: 1rem; 
            transition: all 0.3s ease;
            background-color: #FAFAFA;
        }

        .login-input:focus { 
            border-color: var(--primary-blue); 
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(30, 42, 120, 0.08);
        }
        
        /* Şifrə Sahəsi */
        .password-container { 
            position: relative; 
            width: 100%; 
            margin-bottom: 18px; 
        }
        
        .password-container .login-input { 
            margin-bottom: 0; 
            padding-right: 50px; 
        }

        .toggle-password { 
            position: absolute; 
            right: 16px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: none; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #8E8E93; 
            padding: 5px; 
            transition: color 0.2s;
        }

        .toggle-password:hover { 
            color: var(--primary-blue); 
        }

        .toggle-password svg { 
            width: 22px; 
            height: 22px; 
            fill: currentColor; 
        }

        .login-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent-gold); 
            color: var(--white); 
            border: none; 
            border-radius: var(--border-radius-sm); 
            font-weight: 800; 
            font-size: 1.1rem; 
            cursor: pointer; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 20px rgba(230, 126, 34, 0.25);
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(230, 126, 34, 0.35);
            background: #D35400;
        }
        
        .login-back-btn { 
            display: inline-block; 
            text-decoration: none; 
            color: var(--text-muted); 
            font-size: 0.95rem; 
            font-weight: 700; 
            border-bottom: 2px solid transparent; 
            transition: all 0.2s; 
        }

        .login-back-btn:hover { 
            color: var(--primary-blue);
            border-color: var(--primary-blue); 
        }

        /* Əsas İdarəetmə Paneli Konteyneri */
        .admin-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background-color: var(--white); 
            padding: 35px 30px; 
            border-radius: var(--border-radius-lg); 
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.03); 
            border: 1px solid rgba(0, 0, 0, 0.01);
            display: none; 
        }

        .admin-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--border-color); 
            padding-bottom: 25px; 
            margin-bottom: 35px; 
        }

        .admin-header h1 { 
            color: var(--primary-blue); 
            font-size: 1.8rem; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .logout-btn { 
            background-color: rgba(239, 68, 68, 0.08); 
            color: var(--danger-color); 
            padding: 12px 22px; 
            border: 2px solid transparent; 
            border-radius: var(--border-radius-sm); 
            font-weight: 800; 
            font-size: 0.9rem; 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }

        .logout-btn:hover { 
            background-color: var(--danger-color); 
            color: var(--white);
            box-shadow: 0 6px 15px rgba(239, 68, 68, 0.2);
        }
        
        /* Cədvəl Dizaynı */
        .table-responsive { 
            width: 100%; 
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
        }

        th { 
            background-color: #FAFBFD; 
            color: #7A869A; 
            font-weight: 800; 
            padding: 18px; 
            border-bottom: 2px solid var(--border-color); 
            font-size: 0.85rem; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td { 
            padding: 18px; 
            border-bottom: 1px solid var(--border-color); 
            vertical-align: middle; 
            font-size: 0.95rem; 
            color: var(--text-dark);
        }

        tr {
            transition: background-color 0.2s ease;
        }

        tr:hover { 
            background-color: #FAFBFD; 
        }
        
        /* Telefon və WhatsApp */
        .phone-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            flex-wrap: wrap; 
        }

        .phone-link { 
            color: var(--primary-blue); 
            text-decoration: none; 
            font-weight: 700; 
        }
        
        .whatsapp-btn { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            background-color: var(--whatsapp-color); 
            color: white; 
            text-decoration: none; 
            padding: 8px 16px; 
            border-radius: 10px; 
            font-size: 0.85rem; 
            font-weight: 800; 
            gap: 6px; 
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
            transition: all 0.2s ease; 
        }

        .whatsapp-btn:hover { 
            background-color: #1ebe57; 
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn svg { 
            width: 16px; 
            height: 16px; 
            fill: currentColor; 
            display: block; 
        }
        
        /* Maraqlar/İstəklər Bölməsi */
        .interests-cell { 
            max-width: 250px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            cursor: pointer; 
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .interests-cell:hover { 
            white-space: normal; 
            background: #FFFDF5; 
            color: var(--text-dark);
        }

        /* Əməliyyat Düymələri */
        .action-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        /* Status (Gözləyir/Baxıldı) */
        .status-btn { 
            border: 2px solid #E2E8F0; 
            background: var(--white); 
            color: var(--text-muted); 
            padding: 8px 16px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
        }

        .status-btn:hover { 
            border-color: var(--accent-gold); 
            color: var(--accent-gold); 
        }

        .status-btn.checked { 
            background-color: #EBFDF5; 
            border-color: var(--success-color); 
            color: var(--success-color); 
            font-weight: 800; 
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.1);
        }

        /* Silmə Düyməsi */
        .delete-btn { 
            background-color: #FEF2F2; 
            border: 2px solid #FEE2E2; 
            color: var(--danger-color); 
            padding: 8px 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
        }

        .delete-btn:hover { 
            background-color: var(--danger-color); 
            border-color: var(--danger-color); 
            color: var(--white); 
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .delete-btn svg { 
            width: 18px; 
            height: 18px; 
            fill: currentColor; 
        }

        /* MOBİL RESPONSİVLİK */
        @media (max-width: 768px) {
            body { padding: 15px 10px; }
            
            .login-box { padding: 35px 20px; border-radius: 24px; }
            
            .admin-container { padding: 20px 15px; border-radius: 24px; }
            .admin-header { flex-direction: column; gap: 15px; text-align: center; }
            .admin-header h1 { font-size: 1.4rem; }
            
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            
            tr {
                background: #fff;
                border: 1px solid var(--border-color);
                border-radius: 20px;
                margin-bottom: 20px;
                padding: 18px;
                box-shadow: 0 6px 15px rgba(0, 0, 0, 0.01);
            }
            
            td {
                text-align: right;
                padding: 10px 0;
                border-bottom: 1px dashed rgba(30, 42, 120, 0.06);
                position: relative;
                display: flex;
                justify-content: space-between;
                align-items: center;
                white-space: normal;
            }
            
            td:last-child { border-bottom: none; padding-top: 15px; }

            td::before {
                content: attr(data-label);
                float: left;
                font-weight: 800;
                color: #7A869A;
                font-size: 0.85rem;
            }

            .interests-cell { max-width: 100%; text-align: right; }
            .phone-container { justify-content: flex-end; }
            .action-container { justify-content: flex-end; width: 100%; }
            
            .whatsapp-btn span { display: none; }
            .whatsapp-btn { padding: 8px 12px; border-radius: 8px; }
            .whatsapp-btn svg { width: 18px; height: 18px; }
        }
    </style>
</head>
<body>

    <!-- Firestore Bağlantılı Login Ekranı -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>Giriş Paneli ⚙️</h2>
            <input type="text" id="username" class="login-input" placeholder="İstifadəçi adı">
            
            <div class="password-container">
                <input type="password" id="password" class="login-input" placeholder="Şifrə">
                <button type="button" onclick="togglePasswordVisibility()" class="toggle-password" id="togglePasswordBtn" title="Şifrəni göstər">
                    <svg id="eyeClosedIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    <svg id="eyeOpenIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0-4.5c-5 0-9.27 3.11-11 7.5 1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 16.5c-2.48 0-4.5-2.02-4.5-4.5S9.52 7.5 12 7.5s4.5 2.02 4.5 4.5-2.02 4.5-4.5 4.5z"/></svg>
                </button>
            </div>

            <button onclick="checkFirestoreLogin()" id="loginBtn" class="login-btn">Daxil Ol</button>
            <div>
                <a href="index.html" class="login-back-btn">← Əsas Səhifəyə Qayıt</a>
            </div>
            <p id="loginError" style="color: var(--danger-color); font-weight: 700; margin-top: 15px; display: none; font-size: 0.9rem;">Məlumatlar yanlışdır və ya baza bağlantısı qurulmadı!</p>
        </div>
    </div>

    <!-- Sifariş Paneli -->
    <div class="admin-container" id="adminContainer">
        <div class="admin-header">
            <h1>📝 Sifarişlər</h1>
            <button onclick="logoutAdmin()" class="logout-btn">Çıxış Et</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Valideynin Adı</th>
                        <th>Telefon / WhatsApp</th>
                        <th>Uşağın Adı</th>
                        <th>Yaşı</th>
                        <th>Maraqları / İstəkləri</th>
                        <th>Sifariş Tarixi</th>
                        <th>Əməliyyatlar / Status</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; color: #888; padding: 30px; font-weight: 700;">Məlumatlar yüklənir...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Real Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyDWqLPM2X89vyqOYocw4KEBh65WKMutZOI", 
            authDomain: "gunelsstory-6d3a9.firebaseapp.com", 
            projectId: "gunelsstory-6d3a9", 
            storageBucket: "gunelsstory-6d3a9.firebasestorage.app", 
            messagingSenderId: "903174908342", 
            appId: "1:903174908342:web:f73871214550442e553917", 
            measurementId: "G-5Q48RSFFH9" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Şifrəni göstərib gizlədən funksiya
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeOpenIcon = document.getElementById('eyeOpenIcon');
            const eyeClosedIcon = document.getElementById('eyeClosedIcon');
            const toggleBtn = document.getElementById('togglePasswordBtn');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpenIcon.style.display = 'block';
                eyeClosedIcon.style.display = 'none';
                toggleBtn.setAttribute('title', 'Şifrəni gizlə');
            } else {
                passwordInput.type = 'password';
                eyeOpenIcon.style.display = 'none';
                eyeClosedIcon.style.display = 'block';
                toggleBtn.setAttribute('title', 'Şifrəni göstər');
            }
        }

        // Səhifə yüklənəndə brauzer yaddaşını yoxlayan funksiya
        window.addEventListener('DOMContentLoaded', (event) => {
            const isAdminLoggedIn = localStorage.getItem('adminLoggedIn');
            if (isAdminLoggedIn === 'true') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                startListeningOrders();
            }
        });

        // Giriş Məlumatlarını Yoxlayan Funksiya
        function checkFirestoreLogin() {
            const userInput = document.getElementById('username').value;
            const passInput = document.getElementById('password').value;
            const errorText = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');

            errorText.style.display = 'none';
            loginBtn.innerText = "Yoxlanılır...";
            loginBtn.disabled = true;

            db.collection("adminConfig").doc("credentials").get().then(function(doc) {
                if (doc.exists) {
                    const dbData = doc.data();
                    if (userInput === dbData.username && passInput === dbData.password) {
                        localStorage.setItem('adminLoggedIn', 'true');
                        document.getElementById('loginOverlay').style.display = 'none';
                        document.getElementById('adminContainer').style.display = 'block';
                        startListeningOrders();
                    } else {
                        errorText.innerText = "İstifadəçi adı və ya şifrə yanlışdır!";
                        errorText.style.display = 'block';
                    }
                } else {
                    errorText.innerText = "Firestore-da adminConfig kolleksiyası tapılmadı!";
                    errorText.style.display = 'block';
                }
            }).catch(function(error) {
                errorText.innerText = "Bağlantı xətası: " + error.message;
                errorText.style.display = 'block';
            }).finally(function() {
                loginBtn.innerText = "Daxil Ol";
                loginBtn.disabled = false;
            });
        }

        // Çıxış Etmə Funksiyası
        function logoutAdmin() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('adminContainer').style.display = 'none';
            document.getElementById('loginOverlay').style.display = 'flex';
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            
            // Çıxış edərkən sahəni yenidən gizli növünə qaytarırıq
            const passwordInput = document.getElementById('password');
            passwordInput.type = 'password';
            document.getElementById('eyeOpenIcon').style.display = 'none';
            document.getElementById('eyeClosedIcon').style.display = 'block';

            document.getElementById('loginError').style.display = 'none';
        }

        // Statusu (Baxıldı tikini) dəyişən funksiya
        function toggleStatus(docId, currentStatus) {
            db.collection("orders").doc(docId).update({
                isViewed: !currentStatus
            }).catch(function(error) {
                console.error("Status yenilənmədi:", error);
            });
        }

        // Sifarişi bazadan silən funksiya
        function deleteOrder(docId, parentName) {
            const confirmDelete = confirm(`${parentName} adlı valideynin sifarişini silmək istədiyinizdən əminsiniz?`);
            if (confirmDelete) {
                db.collection("orders").doc(docId).delete().then(function() {
                    console.log("Sifariş uğurla silindi.");
                }).catch(function(error) {
                    alert("Silinmə zamanı xəta baş verdi: " + error.message);
                });
            }
        }

        // Sifarişləri Canlı Dinləyən Funksiya
        function startListeningOrders() {
            const ordersTableBody = document.getElementById('ordersTableBody');

            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(function(snapshot) {
                ordersTableBody.innerHTML = ''; 

                if (snapshot.empty) {
                    ordersTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px; color: #888; font-weight: 700;">Hələ heç bir müraciət yoxdur.</td></tr>';
                    return;
                }

                snapshot.forEach(function(doc) {
                    const data = doc.data();
                    const docId = doc.id;
                    const isViewed = data.isViewed || false;
                    const parentName = data.parentName || 'Naməlum';

                    let orderDate = "Gözlənilir...";
                    if (data.createdAt) {
                        orderDate = data.createdAt.toDate().toLocaleString('az-AZ');
                    }

                    const cleanPhone = (data.parentPhone || '').replace(/\D/g, '');
                    let waLink = `https://wa.me/${cleanPhone}`;
                    if (cleanPhone.startsWith('0')) {
                        waLink = `https://wa.me/994${cleanPhone.substring(1)}`;
                    }

                    const tr = document.createElement('tr');
                    
                    const statusClass = isViewed ? 'status-btn checked' : 'status-btn';
                    const statusText = isViewed ? '✓ Baxıldı' : 'Gözləyir';

                    tr.innerHTML = `
                        <td data-label="Valideyn: " style="font-weight: 700; color: var(--primary-blue);">${parentName}</td>
                        <td data-label="Əlaqə: ">
                            <div class="phone-container">
                                <a href="tel:${data.parentPhone || ''}" class="phone-link">${data.parentPhone || ''}</a>
                                <a href="${waLink}" target="_blank" class="whatsapp-btn">
                                    <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
                                    <span>WhatsApp</span>
                                </a>
                            </div>
                        </td>
                        <td data-label="Uşaq: " style="font-weight: 600;">${data.childName || ''}</td>
                        <td data-label="Yaş: "><span style="background: rgba(30, 42, 120, 0.06); color: var(--primary-blue); padding: 6px 12px; border-radius: 8px; font-weight: 800;">${data.childAge || '-'}</span></td>
                        <td data-label="Maraqlar: " class="interests-cell" title="Tam görmək üçün üzərinə gəlin">${data.childInterests || '-'}</td>
                        <td data-label="Tarix: " style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600;">${orderDate}</td>
                        <td data-label="Status: ">
                            <div class="action-container">
                                <!-- Silmə düyməsi -->
                                <button class="delete-btn" onclick="deleteOrder('${docId}', '${parentName}')" title="Sifarişi sil">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                </button>
                                <!-- Status düyməsi -->
                                <button class="${statusClass}" onclick="toggleStatus('${docId}', ${isViewed})">
                                    ${statusText}
                                </button>
                            </div>
                        </td>
                    `;
                    ordersTableBody.appendChild(tr);
                });
            });
        }
    </script>
</body>
</html>
